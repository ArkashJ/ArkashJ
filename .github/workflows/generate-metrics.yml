name: Generate static metrics

# Nightly run that snapshots GitHub stats into committed SVGs at assets/.
# The README references those SVGs by relative path, so the badges never
# depend on a public Vercel service being available at render time.
#
# Manual run: Actions tab -> "Generate static metrics" -> Run workflow.
#
# Private/org repo coverage: the default GITHUB_TOKEN only sees this repo.
# To include private repos and Benmore-Studio / Patriot-Compliance /
# kirchhausenlab work in the languages stats, create a PAT at
# https://github.com/settings/tokens with `repo` + `read:org` scopes and
# add it as a repo secret named METRICS_TOKEN. The workflow auto-uses it
# when set, otherwise falls back to GITHUB_TOKEN (public-only view).

on:
  schedule:
    - cron: "17 4 * * *"   # 04:17 UTC daily (off-peak)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: General stats card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: ArkashJ
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/New_York
          filename: assets/metrics.svg

      - name: Top languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: ArkashJ
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_ignored: >-
            html, css, tex, makefile, shell, dockerfile, mathematica
          # Looks at every repo the token can see — set METRICS_TOKEN
          # to surface private/org repos (Benmore-Studio, etc.).
          plugin_languages_details: bytes-size, percentage
          filename: assets/languages.svg

      - name: Commit and push
        run: |
          if [ -n "$(git status --porcelain assets/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/
            git commit -m "chore(metrics): refresh stats snapshot"
            git push
          fi
